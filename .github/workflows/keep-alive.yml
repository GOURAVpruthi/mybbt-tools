name: Keep Alive — Ping mybbt-tools

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render site
        run: |
          curl -sf https://mybbt-tools.onrender.com/ping || true
          echo "✅ Pinged mybbt-tools.onrender.com"
