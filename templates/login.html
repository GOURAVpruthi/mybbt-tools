<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — MYBBT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--navy:#040d1f;--navy2:#071329;--accent:#c9a84c;--accent2:#e8c96a;--white:#ffffff;--muted:#8899bb;--text:#d4e0f5;--glass:rgba(255,255,255,0.04);--glass-border:rgba(201,168,76,0.18);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#bg-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
.container{position:relative;z-index:10;width:100%;max-width:420px;padding:40px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;box-shadow:0 30px 60px rgba(0,0,0,.4),0 0 40px rgba(201,168,76,.08);backdrop-filter:blur(20px);}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:30px}
.logo-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white);letter-spacing:1px}
.logo-text span{color:var(--accent)}
.form-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--white);margin-bottom:8px;text-align:center}
.form-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:30px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.form-control{width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);color:var(--white);padding:14px 16px;border-radius:12px;font-size:14px;outline:none;transition:all 0.3s}
.form-control:focus{border-color:var(--accent);background:rgba(0,0,0,0.4);box-shadow:0 0 0 4px rgba(201,168,76,0.1)}
.btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);padding:14px 32px;border-radius:12px;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 24px rgba(201,168,76,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,168,76,.4)}
.btn:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.switch-text{text-align:center;font-size:13px;color:var(--muted);margin-top:24px}
.switch-text a{color:var(--accent);text-decoration:none;font-weight:600}
.switch-text a:hover{text-decoration:underline}
#register-form{display:none}
.toast{position:fixed;bottom:-100px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(16,185,129,.3);transition:.4s;z-index:9999;}
.toast.show{bottom:30px}
.toast.error{background:#ef4444;box-shadow:0 10px 30px rgba(239,68,68,.3);}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div id="toast" class="toast"></div>

<div class="container">
  <a href="/" class="logo">
    <div class="logo-text">MY<span>BBT</span></div>
  </a>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <h1 class="form-title">Welcome Back</h1>
    <p class="form-sub">Sign in to access your professional tools.</p>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" class="form-control" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pwd" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn" id="btn-login" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    <div class="switch-text">Don't have an account? <a href="#" onclick="toggleForm('register')">Create one</a></div>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form">
    <h1 class="form-title">Create Account</h1>
    <p class="form-sub">Join MYBBT and supercharge your workflow.</p>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" class="form-control" placeholder="CA Ramesh Kumar">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="reg-email" class="form-control" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-pwd" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn" id="btn-reg" onclick="doRegister()"><i class="fas fa-user-plus"></i> Create Account</button>
    <div class="switch-text">Already have an account? <a href="#" onclick="toggleForm('login')">Sign in</a></div>
  </div>
  <!-- VERIFY FORM -->
  <div id="verify-form" style="display: none;">
    <h1 class="form-title">Verify Email</h1>
    <p class="form-sub" id="verify-sub">Check your inbox for the 6-digit code.</p>
    <div class="form-group">
      <label>Enter OTP Code</label>
      <input type="text" id="verify-otp" class="form-control" placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 4px; font-size: 20px; font-weight: bold;">
    </div>
    <button class="btn" id="btn-verify" onclick="doVerify()"><i class="fas fa-check-circle"></i> Verify & Login</button>
    <div class="switch-text"><a href="#" onclick="toggleForm('login')">Back to Sign In</a></div>
  </div>
</div>

<script>
let verificationEmail = '';

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (isError ? 'error' : '');
  setTimeout(()=> t.classList.remove('show'), 3000);
}

function toggleForm(type){
  document.getElementById('login-form').style.display = type === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = type === 'register' ? 'block' : 'none';
  document.getElementById('verify-form').style.display = type === 'verify' ? 'block' : 'none';
}

async function doLogin(){
  const email = document.getElementById('login-email').value;
  const pwd = document.getElementById('login-pwd').value;
  if(!email || !pwd) return showToast('Please enter email and password', true);
  
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
  
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: email, password: pwd})
    });
    const data = await res.json();
    if(data.success){
      if(data.requires_otp) {
        verificationEmail = data.email;
        showToast(data.message);
        document.getElementById('verify-sub').textContent = `OTP sent to ${data.email}`;
        setTimeout(() => alert(`Demo Mode - Your OTP for ${data.email} is: ${data.mock_otp}`), 500);
        toggleForm('verify');
      } else {
        window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
      }
    } else {
      showToast(data.error, true);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  } catch(e) {
    showToast('Network error', true);
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
  }
}

async function doRegister(){
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const pwd = document.getElementById('reg-pwd').value;
  if(!name || !email || !pwd) return showToast('Please fill all fields', true);
  
  const btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
  
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password: pwd})
    });
    const data = await res.json();
    if(data.success){
      verificationEmail = data.email;
      showToast(data.message);
      document.getElementById('verify-sub').textContent = `OTP sent to ${data.email}`;
      setTimeout(() => alert(`Demo Mode - Your OTP for ${data.email} is: ${data.mock_otp}`), 500);
      toggleForm('verify');
    } else {
      showToast(data.error, true);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  } catch(e) {
    showToast('Network error', true);
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
  }
}

async function doVerify(){
  const otp = document.getElementById('verify-otp').value.trim();
  if(!otp) return showToast('Please enter the OTP', true);
  
  const btn = document.getElementById('btn-verify');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
  
  try {
    const res = await fetch('/api/auth/verify_otp', {
      method: 'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: verificationEmail, otp})
    });
    const data = await res.json();
    if(data.success){
      window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
    } else {
      showToast(data.error, true);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Login';
    }
  } catch(e) {
    showToast('Network error', true);
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify & Login';
  }
}

// Background
const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const particles=Array.from({length:40},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,alpha:Math.random()*.5+.1}));
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${p.alpha})`;ctx.fill();});requestAnimationFrame(draw);}draw();
</script>
</body>
</html>
