<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance — MYBBT Professional Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--navy:#040d1f;--navy2:#071329;--accent:#c9a84c;--accent2:#e8c96a;--white:#ffffff;--muted:#8899bb;--text:#d4e0f5;--glass:rgba(255,255,255,0.04);--glass-border:rgba(201,168,76,0.18);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#bg-canvas{position:absolute;inset:0;z-index:0;pointer-events:none}
.container{position:relative;z-index:10;text-align:center;max-width:600px;padding:40px;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;box-shadow:0 30px 60px rgba(0,0,0,.4),0 0 40px rgba(201,168,76,.08);backdrop-filter:blur(20px);}
.icon{font-size:64px;color:var(--accent);margin-bottom:24px;animation:float 4s ease-in-out infinite}
.title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);margin-bottom:16px}
.title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.desc{font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:32px}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--navy);padding:14px 32px;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;transition:.3s;display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(201,168,76,.3)}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(201,168,76,.4)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.logo{position:absolute;top:40px;left:40px;display:flex;align-items:center;gap:10px;text-decoration:none;z-index:10}
.logo-text{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--white);letter-spacing:1px}
.logo-text span{color:var(--accent)}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<a href="/" class="logo">
  <div class="logo-text">MY<span>BBT</span></div>
</a>

<div class="container">
  <div class="icon"><i class="fas fa-tools"></i></div>
  <h1 class="title">System <span>Maintenance</span></h1>
  <p class="desc">We are currently upgrading our servers to handle high demand. Features like advanced GST Reconciliation, Subscriptions, and Payments are temporarily offline. Please stay tuned as we will be live soon with massive performance upgrades!</p>
  <a href="/" class="btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>

<script>
// Simple particle background
const canvas=document.getElementById('bg-canvas');const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const particles=Array.from({length:40},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,alpha:Math.random()*.5+.1}));
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${p.alpha})`;ctx.fill();});requestAnimationFrame(draw);}draw();
</script>
</body>
</html>
