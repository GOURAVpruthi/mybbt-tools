<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#e2192c"/>
<title>Scan Document — MyBBT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;
  min-height:100vh;overscroll-behavior:none}

.header{background:#e2192c;padding:16px 20px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(226,25,44,.3)}
.header-icon{font-size:1.4rem}
.header-title{font-size:1rem;font-weight:700;color:#fff}
.header-sub{font-size:.75rem;color:rgba(255,255,255,.8)}

.body{padding:20px;max-width:480px;margin:0 auto}

/* Status banner */
.status-bar{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.status-dot{width:10px;height:10px;border-radius:50%;background:#16a34a;flex-shrink:0;
  animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.2)}}
.status-text{font-size:.85rem;color:#374151;font-weight:500}
.status-count{margin-left:auto;background:#fef2f2;color:#e2192c;border-radius:20px;
  padding:3px 10px;font-size:.8rem;font-weight:700}

/* Camera button — main CTA */
.camera-area{display:flex;flex-direction:column;align-items:center;gap:14px;
  padding:30px 20px;background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);
  margin-bottom:16px;cursor:pointer;border:2px dashed #e5e7eb;transition:all .2s}
.camera-area:active{background:#fff8f8;border-color:#e2192c}
.camera-area input{display:none}
.cam-icon{font-size:3.5rem;line-height:1}
.cam-title{font-size:1.05rem;font-weight:700;color:#1f2937;text-align:center}
.cam-sub{font-size:.82rem;color:#9ca3af;text-align:center}
.cam-btn{padding:14px 32px;background:#e2192c;color:#fff;border-radius:12px;
  font-size:1rem;font-weight:700;border:none;letter-spacing:.01em;margin-top:4px;
  box-shadow:0 4px 12px rgba(226,25,44,.35)}

/* Gallery of scanned images */
.gallery-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.gallery-title{font-size:.85rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em}
.clear-btn{font-size:.78rem;color:#e2192c;background:none;border:none;cursor:pointer;font-weight:600;padding:4px 8px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.gallery-item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:3/4;
  background:#f3f4f6;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.gallery-img{width:100%;height:100%;object-fit:cover;display:block}
.gallery-num{position:absolute;bottom:4px;right:6px;background:rgba(0,0,0,.55);
  color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:8px}
.gallery-del{position:absolute;top:4px;right:4px;background:rgba(226,25,44,.85);color:#fff;
  border:none;border-radius:50%;width:22px;height:22px;font-size:.75rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1}

/* Done button */
.done-area{position:sticky;bottom:0;padding:16px 0 20px;background:linear-gradient(transparent,#f8f9fa 30%)}
.done-btn{width:100%;padding:16px;background:#1f2937;color:#fff;border:none;border-radius:14px;
  font-size:1rem;font-weight:700;letter-spacing:.01em;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:8px}
.done-btn:active{transform:scale(.98);background:#374151}
.done-btn:disabled{opacity:.5;cursor:not-allowed}
.done-btn.success{background:#16a34a}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1f2937;
  color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:500;
  opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}

.empty-state{text-align:center;padding:20px;color:#9ca3af;font-size:.85rem}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">📷</span>
  <div>
    <div class="header-title">Scan to PDF — MyBBT</div>
    <div class="header-sub">Take photos of your document</div>
  </div>
</div>

<div class="body">

  <!-- Status -->
  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Ready to scan</span>
    <span class="status-count" id="scan-count">0 pages</span>
  </div>

  <!-- Camera trigger -->
  <label class="camera-area" id="camera-label">
    <input type="file" id="cam-input" accept="image/*" capture="environment" multiple
      onchange="handleCapture(this)"/>
    <span class="cam-icon">📷</span>
    <span class="cam-title">Tap to Scan Page</span>
    <span class="cam-sub">Uses your back camera for best quality</span>
    <span class="cam-btn">📸 Open Camera</span>
  </label>

  <!-- Gallery of scanned images -->
  <div id="gallery-section" style="display:none">
    <div class="gallery-header">
      <span class="gallery-title">Scanned Pages</span>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- Done / Send to Desktop -->
  <div class="done-area">
    <button class="done-btn" id="done-btn" onclick="sendToDone()" disabled>
      ✅ Done — Send to Desktop
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SESSION_ID = '{{ session_id }}';
const UPLOAD_URL = `/api/scan/upload/${SESSION_ID}`;

let scannedImages = [];
let uploadQueue = [];
let isUploading = false;

function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function updateStatus(text) {
  document.getElementById('status-text').textContent = text;
  const n = scannedImages.length;
  document.getElementById('scan-count').textContent = n + (n===1?' page':' pages');
  document.getElementById('done-btn').disabled = n === 0;
}

function handleCapture(input) {
  if (!input.files || !input.files.length) return;
  const files = Array.from(input.files);
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    scannedImages.push({file: f, url});
    uploadQueue.push(f);
  });
  renderGallery();
  updateStatus('Uploading…');
  document.getElementById('gallery-section').style.display = 'block';
  processQueue();
  // Reset input so same file can be re-selected
  input.value = '';
}

function renderGallery() {
  const g = document.getElementById('gallery');
  g.innerHTML = scannedImages.map((item, i) => `
    <div class="gallery-item">
      <img class="gallery-img" src="${item.url}" alt="Page ${i+1}"/>
      <span class="gallery-num">${i+1}</span>
      <button class="gallery-del" onclick="removePage(${i})">✕</button>
    </div>`).join('');
}

function removePage(i) {
  URL.revokeObjectURL(scannedImages[i].url);
  scannedImages.splice(i, 1);
  renderGallery();
  updateStatus(scannedImages.length > 0 ? 'Ready — tap to add more' : 'Ready to scan');
  if (scannedImages.length === 0) document.getElementById('gallery-section').style.display = 'none';
}

function clearAll() {
  scannedImages.forEach(s => URL.revokeObjectURL(s.url));
  scannedImages = [];
  uploadQueue = [];
  renderGallery();
  document.getElementById('gallery-section').style.display = 'none';
  updateStatus('Ready to scan');
  showToast('All pages cleared');
}

async function processQueue() {
  if (isUploading || uploadQueue.length === 0) return;
  isUploading = true;
  const batch = uploadQueue.splice(0, uploadQueue.length); // take all
  const fd = new FormData();
  batch.forEach(f => fd.append('images[]', f));
  try {
    const res = await fetch(UPLOAD_URL, {method:'POST', body:fd});
    const data = await res.json();
    if (data.success) {
      updateStatus(`${data.total} page${data.total!==1?'s':''} ready — tap to add more`);
      showToast(`📸 ${data.saved} page${data.saved!==1?'s':''} uploaded!`);
    } else {
      updateStatus('Upload error — try again');
      showToast('⚠️ Upload failed: ' + data.error, 3500);
    }
  } catch(e) {
    updateStatus('Network error — check connection');
    showToast('⚠️ Network error', 3000);
  }
  isUploading = false;
  if (uploadQueue.length > 0) processQueue(); // process any queued in meantime
}

async function sendToDone() {
  if (scannedImages.length === 0) return;
  // Make sure everything is uploaded
  if (uploadQueue.length > 0) {
    showToast('Still uploading, please wait…');
    return;
  }
  const btn = document.getElementById('done-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating PDF…';
  try {
    const res = await fetch(`/api/scan/generate/${SESSION_ID}`, {method:'POST'});
    const data = await res.json();
    if (data.success) {
      btn.className = 'done-btn success';
      btn.innerHTML = '🎉 Done! Check your desktop';
      document.getElementById('status-text').textContent = 'PDF ready on desktop!';
      document.getElementById('status-dot').style.background = '#16a34a';
      showToast('✅ PDF created! Download on desktop.', 4000);
    } else {
      btn.disabled = false;
      btn.innerHTML = '✅ Done — Send to Desktop';
      showToast('❌ ' + data.error, 3500);
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '✅ Done — Send to Desktop';
    showToast('❌ Network error', 3000);
  }
}

// Keep session alive
setInterval(() => {
  fetch(`/api/scan/status/${SESSION_ID}`).catch(()=>{});
}, 30000);
</script>
</body>
</html>
