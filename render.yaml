services:
  - type: web
    name: corporate-tools-suite
    env: python
    plan: free
    buildCommand: apt-get update -y && apt-get install -y tesseract-ocr libreoffice --no-install-recommends && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: GEMINI_API_KEY
        value: ""
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
